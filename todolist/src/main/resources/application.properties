# Change the default embedded server port
server.port=8083

# PostgreSQL Database Configuration (values are injected by Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# When the application starts, automatically update the database schema (e.g., create tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Enable automatic Gzip compression for HTTP responses
server.compression.enabled=true

# Tell it to specifically compress our JSON API responses (and web files)
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript

# Only compress responses that are larger than 1KB (compressing tiny responses wastes CPU)
server.compression.min-response-size=1024

# Sentry Error Tracking (The DSN link will be injected via an Environment Variable in Render)
sentry.dsn=${SENTRY_DSN:}
# Capture 100% of transactions for performance monitoring
sentry.traces-sample-rate=1.0
